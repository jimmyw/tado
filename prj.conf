# Serial / Console
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# GPIO
CONFIG_GPIO=y

# SPI
CONFIG_SPI=y
CONFIG_SPI_STM32_INTERRUPT=n

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y

# Stack / MPU
CONFIG_ARM_MPU=y
CONFIG_HW_STACK_PROTECTION=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR=""
CONFIG_NET_CONFIG_MY_IPV4_GW=""

# Network buffers
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_MAX_CONTEXTS=8

# Network management events
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y

# ENC28J60 driver
CONFIG_ETH_ENC28J60=y
CONFIG_ETH_ENC28J60_CLKRDY_INIT_WAIT_MS=500
CONFIG_ETH_ENC28J60_RX_THREAD_STACK_SIZE=2048

# Entropy / random number generator (required by networking)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Thread stacks (networking needs more)
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096

# HTTP client
CONFIG_HTTP_CLIENT=y
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_PARSER_URL=y

# Home Assistant
CONFIG_HA_SERVER_IP="192.168.1.248"
CONFIG_HA_SERVER_PORT=8123
CONFIG_HA_LONG_LIVED_TOKEN="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI0NDBiNWNiYmU2ODQ0YzQ1OWQzY2YzY2ZjYjcxNjNlNSIsImlhdCI6MTc3ODYyMDM2MCwiZXhwIjoyMDkzOTgwMzYwfQ.2nTJXxqT6kt5Z0gOvMKW4DaY6RnnXOB4O1CUAFeYb3I"

# Flash (persist webhook_id across reboots)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
